<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#222222">
<link rel="apple-touch-icon" href="icons/icon-512.png">

<title>Guitar Pattern Editor</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h2>Guitar Pattern Editor</h2>

<div id="controls">

<label>Instrument
<select id="instrument">
<option value="guitar">Guitar</option>
<option value="bass">Bass</option>
</select>
</label>

<label>Startbund
<input type="number" id="startFret" value="0">
</label>

<label>Endbund
<input type="number" id="endFret" value="12">
</label>

<label>Tonart
<select id="root"></select>
</label>

<label>Skala
<select id="scale"></select>
</label>

<label>Position
<select id="position"></select>
</label>

<label>Anzeige
<select id="displayMode">
<option value="notes">Noten</option>
<option value="intervals">Intervalle</option>
</select>
</label>

<button id="applyScaleBtn" onclick="build();applyScale();updateExportHeader();">
Skala anzeigen
</button>

<button id="sequenceModeBtn">Sequence Mode: OFF</button>

<button id="rebuildBtn">Bundbereich</button>
<button id="clearBtn">Clear Marker</button>
<button id="clearSequenceBtn">Clear Sequence</button>
<button id="exportBtn">PNG Export</button>

<div id="exportArea">

<div id="exportHeader"></div>

<div id="board-wrapper">
  <svg id="sequenceLayer"></svg>
  <div id="grid"></div>
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script src="js/scales.js?v=1"></script>
<script src="js/fretboard.js?v=1"></script>
<script src="js/app.js?v=1"></script>
<script src="js/export.js?v=1"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
}
</script>

</body>
</html>
