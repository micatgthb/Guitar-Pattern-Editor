<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#222222">
<link rel="apple-touch-icon" href="icons/icon-512.png">

<title>Guitar Pattern Editor</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h2>Guitar Pattern Editor</h2>

<div id="controls">
  <label>
  <input type="checkbox" id="autoMode" checked>
  Auto Update
</label>

  <!-- 🟦 Instrument & Bereich -->
  <div class="control-group">
    <div class="group-title">Instrument</div>

    <label>
      Instrument
      <select id="instrument">
        <option value="guitar">Guitar</option>
        <option value="bass">Bass</option>
      </select>
    </label>

        <label>
      Start
      <input id="startFret" type="number" value="0">
    </label>
    
    <label>
      End
      <input id="endFret" type="number" value="12">
    </label>


     <button onclick="updateAll(true)">
      Griffbrett aktualisieren
    </button>

  
    
  </div>

  <!-- 🟩 Skala -->
  <div class="control-group">
    <div class="group-title">Skala</div>

    <label>
      Root
      <select id="root"></select>
    </label>

    <label>
      Scale
      <select id="scale"></select>
    </label>

    <label>
      Anzeige
      <select id="displayMode">
        <option value="notes">Notes</option>
        <option value="intervals">Intervals</option>
      </select>
    </label>

    <button onclick="applyScale(); drawSequenceLines();">
      Skala aktualisieren
    </button>
    
  </div>

  <!-- 🟨 Sequence / Playback -->
  <div class="control-group">
    <div class="group-title">Sequence</div>

    <label>
      Dauer
      <select id="durationSelect">
        <option value="2">1/2</option>
        <option value="4">1/4</option>
        <option value="8" selected>1/8</option>
        <option value="16">1/16</option>
      </select>
    </label>

    <label>
      BPM
      <input id="bpm" type="number" value="80">
    </label>

    <button id="sequenceModeBtn">Sequence Mode: OFF</button>
    <button id="clearSequenceBtn">Clear</button>
    <button id="playBtn">Play</button>
    <button id="stopBtn">Stop</button>
  </div>

  <!-- 🟪 Daten -->
<div class="control-group">
  <div class="group-title">Daten</div>

  <button id="saveBtn">Save</button>
  <button id="loadBtn">Load</button>
  <button id="exportBtn">Export PNG</button>
</div>

</div>

<div id="board-wrapper">
  <svg id="sequenceLayer"></svg>
  <div id="grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script src="js/scales.js?v=1"></script>
<script src="js/fretboard.js?v=1"></script>
<script src="js/app.js?v=1"></script>
<script src="js/export.js?v=1"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
}
</script>

</body>
</html>
